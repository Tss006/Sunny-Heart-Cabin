<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心晴小屋 - 首页</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #f5f9ff;
    }

    /* 左侧导航 */
    .sidebar {
      width: 240px;
      background: white;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
      padding: 30px 0;
      z-index: 99;
    }

    .sidebar .logo {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #4a90e2;
      margin-bottom: 40px;
    }

    .sidebar-menu {
      list-style: none;
      padding: 0 20px;
    }

    .sidebar-menu li {
      margin-bottom: 8px;
    }

    .sidebar-menu a {
      display: block;
      padding: 14px 18px;
      border-radius: 12px;
      color: #333;
      text-decoration: none;
      font-size: 16px;
    }

    .sidebar-menu a.active {
      background: #4a90e2;
      color: white;
    }

    /* 右侧内容 —— 只显示内容！！！ */
    .content {
      margin-left: 240px;
      flex: 1;
      padding: 40px;
    }

    /* 隐藏所有多余东西 */
    .banner,
    .home-header,
    .sticker-container,
    .bg-animation,
    footer {
      display: none !important;
    }

    .card-box {
      display: none !important;
    }
  </style>

  <script>
    if (!localStorage.getItem("isLogin")) {
      location.href = "login.html";
    }
  </script>
</head>

<body>

<!-- 左侧导航（唯一导航） -->
<div class="sidebar">
  <div class="logo">心晴小屋</div>
  <ul class="sidebar-menu">
    <li><a href="index.html" class="active">首页</a></li>
    <li><a href="user.html">个人中心</a></li>
    <li><a href="chat.html">AI 聊天</a></li>
    <li><a href="mood.html">心情日记</a></li>
    <li><a href="test.html">心理测试</a></li>
    <li><a href="music.html">治愈音乐</a></li>
    <li><a href="#" id="logout">退出登录</a></li>
  </ul>
</div>

<!-- 右侧：只显示文字 → 你要的干净效果 -->
<div class="content">
  <h1>欢迎来到心晴小屋</h1>
  <p style="margin-top:10px; font-size:18px;">请从左侧菜单选择功能</p>
</div>

<script>
  document.getElementById('logout').onclick = function(){
    if(confirm('确定退出？')){
      localStorage.removeItem("isLogin");
      location.href = "login.html";
    }
  }
</script>

</body>
</html>
