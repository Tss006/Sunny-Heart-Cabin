<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心晴小屋 - 登录</title>
  <link rel="stylesheet" href="css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  
<body class="login-page"></body>

  <div class="background">
    <div class="photo-container"></div>
    <div class="sticker-container">
      <div class="sticker sun"></div>
      <div class="sticker cloud1"></div>
      <div class="sticker cloud2"></div>
      <div class="sticker star1"></div>
      <div class="sticker star2"></div>
      <div class="sticker heart1"></div>
      <div class="sticker heart2"></div>
      <div class="sticker moon"></div>
    </div>
  </div>

  <div class="bg-animation">
    <div class="floating-element element-1"></div>
    <div class="floating-element element-2"></div>
    <div class="floating-element element-3"></div>
    <div class="floating-element element-4"></div>
  </div>

  <div class="auth-card login-card">
    <div class="card-header">
      <h1 class="main-title">心晴小屋</h1>
      <p class="subtitle">愿每一种情绪，都能被温柔接住</p>
    </div>

    <form class="auth-form login-form">
      <div id="error-message" class="error-message" style="display: none;"></div>
      <div class="form-group">
        <label for="login-account">账号</label>
        <input type="text" id="login-account" placeholder="请输入您的账号" required>
      </div>
      <div class="form-group">
        <label for="login-password">密码</label>
        <input type="password" id="login-password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn-primary">登录</button>
    </form>

    <div class="card-footer">
      <a href="register.html" class="link-text">还没有账号？前往注册</a>
    </div>
  </div>
<script src="js/login.js"></script>
</body>
</html>
