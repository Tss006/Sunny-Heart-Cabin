<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心晴小屋 - 个人中心</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .user-container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .user-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .user-title {
      font-size: 28px;
      color: #4a90e2;
      margin-bottom: 10px;
    }

    .user-desc {
      color: #555;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .info-row {
      display: flex;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #eee;
    }

    .info-label {
      width: 120px;
      font-weight: 600;
      color: #333;
    }

    .info-value {
      color: #555;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .menu-item {
      background: rgba(255,255,255,0.9);
      padding: 25px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: 0.3s;
      cursor: pointer;
    }

    .menu-item:hover {
      transform: translateY(-5px);
      background: rgba(74,144,226,0.1);
    }

    .menu-item h4 {
      margin: 10px 0 5px;
      color: #4a90e2;
    }

    .menu-item p {
      font-size: 13px;
      color: #666;
    }

    .logout-btn {
      background: #ff6b6b;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #ff4444;
    }
  </style>
</head>

<body>
  <div class="sticker-container"></div>
  <div class="bg-animation"></div>

  <div class="user-container">
    <!-- 个人信息卡片 -->
    <div class="user-card">
      <h2 class="user-title">👋 欢迎回来，我的用户</h2>
      <p class="user-desc">这里是你的专属心晴空间，记录每一份情绪</p>

      <div class="info-row">
        <div class="info-label">用户昵称</div>
        <div class="info-value">心晴小屋用户</div>
      </div>
      <div class="info-row">
        <div class="info-label">注册状态</div>
        <div class="info-value">已注册 · 普通用户</div>
      </div>
      <div class="info-row">
        <div class="info-label">当前状态</div>
        <div class="info-value">已登录</div>
      </div>

      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <!-- 功能菜单 -->
    <div class="user-card">
      <h3 style="margin-bottom:20px;">📋 功能中心</h3>
      <div class="menu-grid">
        <div class="menu-item">
          <h4>心情日记</h4>
          <p>记录每日情绪</p>
        </div>
        <div class="menu-item">
          <h4>心理测评</h4>
          <p>专业心理健康评估</p>
        </div>
        <div class="menu-item">
          <h4>我的报告</h4>
          <p>查看历史测评结果</p>
        </div>
        <div class="menu-item">
          <h4>设置</h4>
          <p>账号与隐私设置</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('isLogin');
        location.href = 'login.html';
      }
    }

    // 未登录不能进入个人中心
    window.onload = function() {
      const isLogin = localStorage.getItem('isLogin');
      if (!isLogin) {
        alert('请先登录');
        location.href = 'login.html';
      }
    }
  </script>

</body>
</html>
